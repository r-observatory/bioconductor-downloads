name: Build Bioconductor oldstats Archive

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bioconductor-oldstats
  cancel-in-progress: false

jobs:
  oldstats:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::RSQLite
            any::DBI
            any::jsonlite
            any::curl
            any::testthat
            any::withr
      - name: Run unit tests
        run: Rscript tests/testthat.R
      - name: Build the frozen oldstats archive
        run: |
          mkdir -p out
          Rscript scripts/bootstrap-from-oldstats.R out/
      - name: Upload the archive and patch the manifest oldstats block
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release download current --pattern manifest.json --dir out --clobber || true
          if [ -f out/manifest.json ]; then
            jq --slurpfile o out/oldstats-block.json '.oldstats = $o[0]' out/manifest.json > out/manifest.new
            mv out/manifest.new out/manifest.json
          fi
          gh release upload current out/bioconductor-oldstats.db --clobber
          gh release upload current out/manifest.json --clobber
